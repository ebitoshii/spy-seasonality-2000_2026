<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SPY Seasonality</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif;margin:0;padding:0}
body{background:#0f1117;color:#e2e8f0;padding:16px}
.ctrl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:1rem;padding:12px 14px;background:#1a1d27;border-radius:10px;border:0.5px solid #2d3148}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-label{font-size:12px;color:#8892a4}
select{height:34px;padding:0 8px;border:0.5px solid #2d3148;border-radius:6px;background:#22263a;color:#e2e8f0;font-size:13px}
.metric-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.day-card{background:#1a1d27;border-radius:8px;padding:10px 12px;border:0.5px solid #2d3148}
.day-card h3{font-size:13px;font-weight:500;margin:0 0 8px}
.win-bar-wrap{height:5px;background:#22263a;border-radius:3px;margin-bottom:8px;overflow:hidden}
.win-bar{height:100%;border-radius:3px}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:#8892a4;margin-bottom:3px}
.stat-val{font-weight:500;color:#c9d3e0}
.up{color:#4ade80}.dn{color:#f87171}
.section-title{font-size:11px;font-weight:500;color:#8892a4;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-wrap{position:relative;width:100%;height:220px}
.chart-wrap2{position:relative;width:100%;height:180px}
.ex-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid #2d3148}
.ex-row:last-child{border-bottom:none}
.ex-date{color:#8892a4}
.ex-pct-up{font-weight:500;color:#4ade80;text-align:right}
.ex-pct-dn{font-weight:500;color:#f87171;text-align:right}
.ext-box{border:0.5px solid #2d3148;border-radius:8px;padding:10px 12px;background:#1a1d27}
.extremes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gain-box{border:0.5px solid #166534;border-radius:8px;padding:10px 12px;background:#052e16}
.loss-box{border:0.5px solid #991b1b;border-radius:8px;padding:10px 12px;background:#1c0c0c}
.year-pills{display:flex;flex-wrap:wrap;gap:5px;max-height:80px;overflow-y:auto}
.pill{font-size:11px;padding:3px 9px;border-radius:12px;border:0.5px solid #2d3148;cursor:pointer;background:#22263a;color:#8892a4}
.pill.on{background:#2563eb;color:#fff;border-color:#2563eb}
button{cursor:pointer;padding:6px 12px;border:0.5px solid #2d3148;border-radius:6px;background:#22263a;font-size:12px;color:#c9d3e0}
button:hover{background:#2d3148}
.filter-note{font-size:12px;color:#8892a4;margin-bottom:8px}
.sec-wrap{background:#1a1d27;border:0.5px solid #2d3148;border-radius:10px;padding:12px 14px;margin-bottom:1rem}
.gains-label{font-size:12px;color:#4ade80;font-weight:500;margin-bottom:6px}
.losses-label{font-size:12px;color:#f87171;font-weight:500;margin-bottom:6px}
</style>
</head>

const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri'];
const DAY_COLORS=['#60a5fa','#4ade80','#fbbf24','#c084fc','#fb923c'];
let yearsAvailable=[...new Set(FULL_DATA.map(d=>d.year))].sort();
let selectedYears=new Set(yearsAvailable);
let cWin=null,cAvg=null,cDist=null;
const GRID='rgba(255,255,255,0.07)';
const TICK={font:{size:11},color:'#8892a4'};

function median(arr){const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}

function renderApp(){
  const minY=Math.min(...yearsAvailable),maxY=Math.max(...yearsAvailable);
  document.getElementById('app').innerHTML=
    '<div class="ctrl-row">'+
    '<div class="ctrl-group"><span class="ctrl-label">From year</span><select id="fromY">'+yearsAvailable.map(y=>'<option value="'+y+'"'+(y==minY?' selected':'')+'>'+y+'</option>').join('')+'</select></div>'+
    '<div class="ctrl-group"><span class="ctrl-label">To year</span><select id="toY">'+yearsAvailable.map(y=>'<option value="'+y+'"'+(y==maxY?' selected':'')+'>'+y+'</option>').join('')+'</select></div>'+
    '<div class="ctrl-group" style="flex:1"><span class="ctrl-label">Or pick specific years</span><div class="year-pills" id="yearPills"></div></div>'+
    '<div class="ctrl-group"><span class="ctrl-label">&nbsp;</span><button onclick="selectAll()">All</button></div>'+
    '<div class="ctrl-group"><span class="ctrl-label">&nbsp;</span><button onclick="clearAll()">Clear</button></div>'+
    '</div>'+
    '<p class="filter-note" id="filterNote"></p>'+
    '<div class="sec-wrap"><div class="section-title">Win rate &amp; statistics by day</div><div class="metric-grid" id="dayCards"></div></div>'+
    '<div class="sec-wrap"><div class="chart-row">'+
    '<div><div class="section-title">Win rate (%)</div><div class="chart-wrap"><canvas id="chartWin"></canvas></div></div>'+
    '<div><div class="section-title">Avg daily return (%)</div><div class="chart-wrap"><canvas id="chartAvg"></canvas></div></div>'+
    '</div></div>'+
    '<div class="sec-wrap"><div class="section-title">Return distribution by day</div><div class="chart-wrap2"><canvas id="chartDist"></canvas></div></div>'+
    '<div class="sec-wrap"><div class="section-title">Per-day extremes &amp; median</div><div class="extremes-grid" id="extremes"></div></div>'+
    '<div class="sec-wrap"><div class="section-title">Top 5 single-day movers</div><div class="movers-grid">'+
    '<div><div class="gains-label">Largest gains</div><div class="gain-box" id="topGains"></div></div>'+
    '<div><div class="losses-label">Largest losses</div><div class="loss-box" id="topLosses"></div></div>'+
    '</div></div>';
  renderPills();
  document.getElementById('fromY').addEventListener('change',onRangeChange);
  document.getElementById('toY').addEventListener('change',onRangeChange);
  update();
}

function renderPills(){
  const c=document.getElementById('yearPills');if(!c)return;
  c.innerHTML=yearsAvailable.map(y=>'<button class="pill '+(selectedYears.has(y)?'on':'')+'" onclick="toggleYear('+y+')" id="pill-'+y+'">'+y+'</button>').join('');
}
function toggleYear(y){selectedYears.has(y)?selectedYears.delete(y):selectedYears.add(y);const p=document.getElementById('pill-'+y);if(p)p.className='pill '+(selectedYears.has(y)?'on':'');update();}
function onRangeChange(){const from=parseInt(document.getElementById('fromY').value),to=parseInt(document.getElementById('toY').value);selectedYears=new Set(yearsAvailable.filter(y=>y>=from&&y<=to));renderPills();update();}
function selectAll(){selectedYears=new Set(yearsAvailable);renderPills();update();}
function clearAll(){selectedYears=new Set();renderPills();update();}
function getFiltered(){return FULL_DATA.filter(d=>selectedYears.has(d.year));}

function computeStats(filtered){
  return[0,1,2,3,4].map(dow=>{
    const rows=filtered.filter(d=>d.dow===dow),n=rows.length;
    if(!n)return{dow,n,winRate:0,avgRet:0,avgUp:0,avgDn:0,best:null,worst:null,pcts:[]};
    const ups=rows.filter(d=>d.pct_change>0),dns=rows.filter(d=>d.pct_change<0);
    const sorted=[...rows].sort((a,b)=>b.pct_change-a.pct_change);
    const pcts=rows.map(d=>d.pct_change);
    return{dow,n,winRate:ups.length/n*100,avgRet:pcts.reduce((s,v)=>s+v,0)/n,
      avgUp:ups.length?ups.reduce((s,d)=>s+d.pct_change,0)/ups.length:0,
      avgDn:dns.length?dns.reduce((s,d)=>s+d.pct_change,0)/dns.length:0,
      best:sorted[0],worst:sorted[sorted.length-1],pcts};
  });
}

function update(){
  const filtered=getFiltered();
  const n=document.getElementById('filterNote');
  if(n)n.textContent=filtered.length.toLocaleString()+' trading days · '+selectedYears.size+' year'+(selectedYears.size!==1?'s':'')+' selected';
  const stats=computeStats(filtered);
  renderCards(stats);renderWin(stats);renderAvg(stats);renderDist(filtered);renderExtremes(stats);renderMovers(filtered);
}

function renderCards(stats){
  const el=document.getElementById('dayCards');if(!el)return;
  el.innerHTML=stats.map((s,i)=>
    '<div class="day-card">'+
    '<h3 style="color:'+DAY_COLORS[i]+'">'+DAY_NAMES[s.dow]+'</h3>'+
    '<div class="win-bar-wrap"><div class="win-bar" style="width:'+s.winRate.toFixed(1)+'%;background:'+(s.winRate>=50?'#22c55e':'#ef4444')+'"></div></div>'+
    '<div class="stat-row"><span>Win rate</span><span class="stat-val">'+s.winRate.toFixed(1)+'%</span></div>'+
    '<div class="stat-row"><span>Avg return</span><span class="stat-val '+(s.avgRet>=0?'up':'dn')+'">'+(s.avgRet>=0?'+':'')+s.avgRet.toFixed(3)+'%</span></div>'+
    '<div class="stat-row"><span>Avg up day</span><span class="stat-val up">+'+s.avgUp.toFixed(2)+'%</span></div>'+
    '<div class="stat-row"><span>Avg dn day</span><span class="stat-val dn">'+s.avgDn.toFixed(2)+'%</span></div>'+
    '<div class="stat-row"><span>Median</span><span class="stat-val">'+(s.pcts.length?median(s.pcts).toFixed(3)+'%':'—')+'</span></div>'+
    '<div class="stat-row"><span>N days</span><span class="stat-val">'+s.n+'</span></div>'+
    '</div>').join('');
}

function renderWin(stats){
  const ctx=document.getElementById('chartWin');if(!ctx)return;if(cWin)cWin.destroy();
  cWin=new Chart(ctx,{type:'bar',
    data:{labels:DAY_NAMES,datasets:[{label:'Win rate',data:stats.map(s=>parseFloat(s.winRate.toFixed(2))),
      backgroundColor:stats.map(s=>s.winRate>=50?'#22c55e':'#ef4444'),borderWidth:0,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.toFixed(1)+'%'}}},
      scales:{y:{min:40,max:62,ticks:{...TICK,callback:v=>v+'%'},grid:{color:GRID}},x:{ticks:TICK,grid:{display:false}}}}});
}

function renderAvg(stats){
  const ctx=document.getElementById('chartAvg');if(!ctx)return;if(cAvg)cAvg.destroy();
  const vals=stats.map(s=>parseFloat(s.avgRet.toFixed(4)));
  cAvg=new Chart(ctx,{type:'bar',
    data:{labels:DAY_NAMES,datasets:[{label:'Avg return',data:vals,
      backgroundColor:vals.map(v=>v>=0?'#22c55e':'#ef4444'),borderWidth:0,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(c.raw>=0?'+':'')+c.raw.toFixed(4)+'%'}}},
      scales:{y:{ticks:{...TICK,callback:v=>(v>=0?'+':'')+v.toFixed(2)+'%'},grid:{color:GRID}},x:{ticks:TICK,grid:{display:false}}}}});
}

function renderDist(filtered){
  const ctx=document.getElementById('chartDist');if(!ctx)return;if(cDist)cDist.destroy();
  const datasets=[0,1,2,3,4].map((dow,i)=>{
    const rows=filtered.filter(d=>d.dow===dow);
    return{label:DAY_NAMES[dow],data:rows.map(r=>({x:dow+(Math.random()*0.5-0.25),y:r.pct_change})),
      backgroundColor:DAY_COLORS[i]+'55',borderColor:DAY_COLORS[i],borderWidth:0.5,pointRadius:2,pointHoverRadius:4};
  });
  cDist=new Chart(ctx,{type:'scatter',data:{datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(c.raw.y>=0?'+':'')+c.raw.y.toFixed(3)+'%'}}},
      scales:{x:{min:-0.5,max:4.5,ticks:{...TICK,callback:v=>DAY_NAMES[Math.round(v)]||'',stepSize:1},grid:{display:false}},
        y:{ticks:{...TICK,callback:v=>v.toFixed(1)+'%'},grid:{color:GRID}}}}});
}

function renderExtremes(stats){
  const el=document.getElementById('extremes');if(!el)return;
  el.innerHTML=stats.map((s,i)=>
    '<div class="ext-box">'+
    '<div style="font-size:13px;font-weight:500;margin-bottom:6px;color:'+DAY_COLORS[i]+'">'+DAY_NAMES[s.dow]+'</div>'+
    (s.best?'<div class="ex-row"><span class="ex-date">Best</span><span class="ex-pct-up">+'+s.best.pct_change.toFixed(2)+'%<br><span style="font-size:10px;color:#8892a4">'+s.best.date_str+'</span></span></div>':'')+
    (s.worst?'<div class="ex-row"><span class="ex-date">Worst</span><span class="ex-pct-dn">'+s.worst.pct_change.toFixed(2)+'%<br><span style="font-size:10px;color:#8892a4">'+s.worst.date_str+'</span></span></div>':'')+
    (s.pcts.length?'<div class="ex-row"><span class="ex-date">Median</span><span class="stat-val">'+median(s.pcts).toFixed(3)+'%</span></div>':'')+
    '</div>').join('');
}

function renderMovers(filtered){
  const sorted=[...filtered].sort((a,b)=>b.pct_change-a.pct_change);
  const top5=sorted.slice(0,5),bot5=sorted.slice(-5).reverse();
  const row=(r,up)=>'<div class="ex-row"><span class="ex-date">'+r.date_str+' ('+DAY_NAMES[r.dow]+')</span><span class="'+(up?'ex-pct-up':'ex-pct-dn')+'">'+(up?'+':'')+r.pct_change.toFixed(2)+'%</span></div>';
  const g=document.getElementById('topGains'),l=document.getElementById('topLosses');
  if(g)g.innerHTML=top5.map(r=>row(r,true)).join('');
  if(l)l.innerHTML=bot5.map(r=>row(r,false)).join('');
}

renderApp();
</script>
